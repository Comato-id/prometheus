global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "server-ca"
    static_configs:
      - targets: ["ip_server_ca:9100"]

  - job_name: "server-vpn-node"
    static_configs:
            - targets: ["ip_server_vpn:9100"]

  - job_name: "server-vpn-openvpn"
    static_configs:
      - targets: ["ip_server_vpn:9176"]   # OpenVPN exporter

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093
